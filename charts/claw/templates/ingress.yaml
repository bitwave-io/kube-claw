{{- if .Values.ui.ingress.enabled }}
{{- $gke := .Values.ui.ingress.gke | default dict }}
{{- $hcPath := "/ui/secret-intake/healthz" }}
{{- if $gke.managedCert }}
# Google-managed TLS cert for the intake host (auto-provisions once DNS resolves,
# auto-renews). Used instead of a cert-manager tls secret on GKE.
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: claw-ui-cert
  labels:
    app.kubernetes.io/name: claw-controller
spec:
  domains:
    - {{ .Values.ui.ingress.host | quote }}
---
# The intake listener only serves /ui/secret-intake/* — the LB's default "/"
# health check would mark the backend unhealthy (502). Point it at the GET form
# (which renders 200 for any token), so the backend stays healthy.
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: claw-ui-bc
  labels:
    app.kubernetes.io/name: claw-controller
spec:
  healthCheck:
    type: HTTP
    requestPath: {{ $hcPath | quote }}
    port: {{ .Values.service.uiPort }}
---
# Health check for the admin-UI backend (the API listener serves /healthz).
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: claw-api-bc
  labels:
    app.kubernetes.io/name: claw-controller
spec:
  healthCheck:
    type: HTTP
    requestPath: /healthz
    port: {{ .Values.service.apiPort }}
---
{{- end }}
# Token-gated public pages only (DESIGN.md §8.3): /ui/secret-intake/* and the
# /d/* artifact share links — never /v1/*. Both are served by a separate
# listener in the controller.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: claw-ui-intake
  labels:
    app.kubernetes.io/name: claw-controller
  annotations:
    {{- with .Values.ui.ingress.className }}
    # GKE keys the external HTTP(S) LB off this annotation; the ingressClassName
    # field needs a registered IngressClass (GKE doesn't create a "gce" one), so
    # using the annotation is what actually provisions the LB.
    kubernetes.io/ingress.class: {{ . | quote }}
    {{- end }}
    {{- with $gke.staticIpName }}
    kubernetes.io/ingress.global-static-ip-name: {{ . | quote }}
    {{- end }}
    {{- if $gke.managedCert }}
    networking.gke.io/managed-certificates: claw-ui-cert
    {{- end }}
spec:
  {{- if .Values.ui.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ui.ingress.host | quote }}
      secretName: {{ .Values.ui.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.ui.ingress.host | quote }}
      http:
        paths:
          # Public, one-time-token-gated intake UI (separate listener).
          - path: /ui/secret-intake
            pathType: Prefix
            backend:
              service:
                name: claw-controller
                port:
                  number: {{ .Values.service.uiPort }}
          # Time-bound artifact share links (same token-gated listener).
          - path: /d
            pathType: Prefix
            backend:
              service:
                name: claw-controller
                port:
                  number: {{ .Values.service.uiPort }}
          {{- if .Values.ui.ingress.adminUI }}
          # Admin dashboard (basic-auth gated by CLAW_ADMIN_PASSWORD). Longest-
          # prefix routing sends /ui/secret-intake to the UI listener above and
          # everything else under /ui to the API listener. /v1/* is NOT exposed.
          - path: /ui
            pathType: Prefix
            backend:
              service:
                name: claw-controller
                port:
                  number: {{ .Values.service.apiPort }}
          {{- end }}
{{- end }}
