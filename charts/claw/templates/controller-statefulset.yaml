apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: claw-controller
  labels:
    app.kubernetes.io/name: claw-controller
spec:
  serviceName: claw-controller
  replicas: {{ .Values.controller.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: claw-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claw-controller
    spec:
      serviceAccountName: claw-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        # The distroless image runs as 65532; fsGroup makes the persistent volume
        # group-writable by that user so the controller can create its SQLite DB
        # (a root-owned PD mount otherwise yields SQLITE_CANTOPEN).
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --data-dir={{ .Values.controller.dataDir }}
            - --enable-router={{ .Values.controller.enableRouter }}
            - --health-probe-bind-address=:{{ .Values.service.probePort }}
            - --api-bind-address=:{{ .Values.service.apiPort }}
            - --ui-bind-address=:{{ .Values.service.uiPort }}
            - --ui-base-url={{ .Values.controller.uiBaseURL }}
            - --runner-image={{ .Values.controller.runnerImage }}
            - --self-url={{ .Values.controller.selfURL }}
          {{- if or .Values.slack.routes .Values.slack.enabled }}
          env:
            {{- with .Values.slack.routes }}
            - name: CLAW_SLACK_ROUTES
              value: {{ toJson . | quote }}
            {{- end }}
            {{- if .Values.slack.enabled }}
            - name: CLAW_SLACK_APP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.slack.tokenSecretName }}
                  key: app-token
            - name: CLAW_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.slack.tokenSecretName }}
                  key: bot-token
            # Anthropic key powers the LLM image router (classifies requests →
            # picks the best base image). Optional; routing is skipped if absent.
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: claw-anthropic-key
                  key: api-key
                  optional: true
            {{- end }}
          {{- end }}
          ports:
            - name: api
              containerPort: {{ .Values.service.apiPort }}
            - name: ui
              containerPort: {{ .Values.service.uiPort }}
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
            - name: probe
              containerPort: {{ .Values.service.probePort }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: probe
          readinessProbe:
            httpGet:
              path: /readyz
              port: probe
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.controller.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.controller.dataDir }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.controller.storage.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.controller.storage.size }}
