# The self-update plane (DESIGN.md §24): a tiny, always-running supervisor that
# owns the controller StatefulSet via the ControlPlane CR. The chart no longer
# templates the controller workload — the supervisor renders it, which is what
# makes updates (and rollbacks) possible while Helm stays out of the loop.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claw-supervisor
  labels:
    app.kubernetes.io/name: claw-supervisor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: claw-supervisor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: claw-supervisor
    spec:
      serviceAccountName: claw-supervisor
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: supervisor
          image: "{{ .Values.supervisor.repository }}:{{ .Values.supervisor.tag | default .Values.version }}"
          imagePullPolicy: {{ .Values.supervisor.pullPolicy }}
          args:
            - --log-format={{ .Values.controller.logFormat }}
          env:
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            # Failure notifications: ONE bare chat.postMessage with the bot
            # token — no socket mode. Optional; absent secret = log-only.
            - name: CLAW_SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.slack.tokenSecretName }}
                  key: bot-token
                  optional: true
            {{- with .Values.updates.manifestPublicKey }}
            # Manifest signing trust anchor (T-9): with this set, an unsigned
            # or tampered manifest is rejected outright.
            - name: CLAW_MANIFEST_PUBKEY
              value: {{ . | quote }}
            {{- end }}
          ports:
            - name: probe
              containerPort: 8081
          livenessProbe:
            httpGet:
              path: /healthz
              port: probe
          readinessProbe:
            httpGet:
              path: /readyz
              port: probe
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.supervisor.resources | nindent 12 }}
