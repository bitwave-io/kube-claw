image:
  repository: docker.io/bitwavecode/kube-claw-controller
  # Pin to an immutable release tag (NOT :latest). :latest makes upgrades
  # non-deterministic — same tag => no pod spec change => `helm upgrade` won't
  # roll new code, and `helm rollback` can't restore a prior image. CI publishes
  # <semver> (docker/metadata-action strips the leading v from the git tag) and
  # sha-<commit> tags; bump this in lockstep with Chart.yaml appVersion.
  # Quickstart users can override to :latest if desired.
  tag: "0.3.2"
  pullPolicy: IfNotPresent

# Namespace agents live in. Created by the deploy script (scripts/deploy-gke.sh /
# install.sh) before the chart is installed; the controller seeds a default Agent
# here on startup so the install works out of the box. Not chart-managed to avoid
# Helm ownership conflicts with the imperatively-created namespace.
agentNamespace: claw-agents

# PDB (maxUnavailable: 0) over agent run pods so cluster-autoscaler scale-down
# can't evict a warm session pod mid-run (Autopilot rejects safe-to-evict=false
# on pods requesting <500m CPU). Drains wait at most the run Job's
# activeDeadlineSeconds (30m). Disable if you'd rather let consolidation win.
agentPodDisruptionBudget:
  enabled: true

controller:
  # Opt-in agent egress restriction (deny east/west). Verify per-cluster before enabling.
  restrictAgentEgress: false
  replicas: 1
  dataDir: /var/lib/claw
  enableRouter: true
  # Controller log format: "console" (human-readable, for local `kubectl logs`)
  # or "json" (structured — set in cloud overlays so the log backend parses
  # severity/message into queryable fields). See values-gke.yaml.
  logFormat: console
  # Image the run engine launches for each run Job (DESIGN.md §11). Pinned to the
  # same release tag as the controller (see image.tag note re: :latest).
  runnerImage: docker.io/bitwavecode/kube-claw-runner:0.3.2
  # Admin dashboard (/ui) basic-auth password is read from this Secret (key
  # "password", user "admin"). Absent secret/key => the admin UI is unauthenticated.
  # scripts/install.sh creates it; create out-of-band otherwise.
  adminSecretName: claw-admin
  # In-cluster URL run pods use to reach the controller API.
  selfURL: http://claw-controller.claw-system.svc:8443
  # Public base URL of the secret-intake UI (used in returned links). Override to
  # the Ingress host in prod, or the port-forwarded localhost in dev.
  uiBaseURL: http://localhost:8090
  # GKE Autopilot requires resource requests; set explicitly to control sizing/cost.
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  storage:
    size: 20Gi
    # GKE Autopilot: the default StorageClass is a ZONAL PD. With one replica, a
    # cross-zone reschedule can't re-attach a zonal disk. Use a regional class
    # (e.g. "premium-rwo" or a custom regional-pd class). "" = cluster default.
    storageClassName: ""

service:
  apiPort: 8443
  metricsPort: 8080
  probePort: 8081
  uiPort: 8090

# Secret-intake UI (DESIGN.md §8.3). Exposes ONLY /ui/secret-intake/* via Ingress.
ui:
  ingress:
    enabled: false
    host: claw.example.com
    className: ""
    tls:
      enabled: true
      secretName: claw-ui-tls

# Slack connector. When enabled, the controller reads the app + bot tokens from
# the named Kubernetes Secret (keys: app-token, bot-token). Create that Secret
# out-of-band (e.g. via scripts/install.sh, which prompts) — tokens are NOT put
# in Helm values/history.
slack:
  enabled: false
  tokenSecretName: claw-slack-tokens
  # Channel → agent routing. Used by both Socket Mode and the fake event endpoint
  # (so routing is testable without tokens). Example:
  #   routes:
  #     - channels: ["C_COST"]
  #       mentionRequired: false
  #       agentNamespace: claw-agents
  #       agentName: gcp-cost
  routes: []
