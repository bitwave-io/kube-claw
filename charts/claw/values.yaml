image:
  repository: docker.io/bitwavecode/kube-claw-controller
  tag: latest
  pullPolicy: IfNotPresent

controller:
  # Opt-in agent egress restriction (deny east/west). Verify per-cluster before enabling.
  restrictAgentEgress: false
  replicas: 1
  dataDir: /var/lib/claw
  enableRouter: true
  # Image the run engine launches for each run Job (DESIGN.md §11).
  runnerImage: docker.io/bitwavecode/kube-claw-runner:latest
  # Admin dashboard (/ui) basic-auth password is read from this Secret (key
  # "password", user "admin"). Absent secret/key => the admin UI is unauthenticated.
  # scripts/install.sh creates it; create out-of-band otherwise.
  adminSecretName: claw-admin
  # In-cluster URL run pods use to reach the controller API.
  selfURL: http://claw-controller.claw-system.svc:8443
  # Public base URL of the secret-intake UI (used in returned links). Override to
  # the Ingress host in prod, or the port-forwarded localhost in dev.
  uiBaseURL: http://localhost:8090
  # GKE Autopilot requires resource requests; set explicitly to control sizing/cost.
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  storage:
    size: 20Gi
    # GKE Autopilot: the default StorageClass is a ZONAL PD. With one replica, a
    # cross-zone reschedule can't re-attach a zonal disk. Use a regional class
    # (e.g. "premium-rwo" or a custom regional-pd class). "" = cluster default.
    storageClassName: ""

service:
  apiPort: 8443
  metricsPort: 8080
  probePort: 8081
  uiPort: 8090

# Secret-intake UI (DESIGN.md §8.3). Exposes ONLY /ui/secret-intake/* via Ingress.
ui:
  ingress:
    enabled: false
    host: claw.example.com
    className: ""
    tls:
      enabled: true
      secretName: claw-ui-tls

# Slack connector. When enabled, the controller reads the app + bot tokens from
# the named Kubernetes Secret (keys: app-token, bot-token). Create that Secret
# out-of-band (e.g. via scripts/install.sh, which prompts) — tokens are NOT put
# in Helm values/history.
slack:
  enabled: false
  tokenSecretName: claw-slack-tokens
  # Channel → agent routing. Used by both Socket Mode and the fake event endpoint
  # (so routing is testable without tokens). Example:
  #   routes:
  #     - channels: ["C_COST"]
  #       mentionRequired: false
  #       agentNamespace: claw-agents
  #       agentName: gcp-cost
  routes: []
