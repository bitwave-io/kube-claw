---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: agents.claw.run
spec:
  group: claw.run
  names:
    kind: Agent
    listKind: AgentList
    plural: agents
    shortNames:
    - ag
    singular: agent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.selectedImageDigest
      name: Image
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Agent is the single user-facing kube-claw runtime resource.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              AgentSpec is the desired state of an Agent.

              The Agent is the only kube-claw CRD: base image, storage, and secret refs are
              inline fields here rather than separate CRDs (DESIGN.md §6).
            properties:
              baseImageRef:
                description: |-
                  BaseImageRef names a registered base image (BaseImage registry) the
                  controller resolves to a concrete image. Takes precedence over Image.
                type: string
              command:
                description: |-
                  Command overrides the pod entrypoint. Defaults to the bootstrap+runner
                  contract (DESIGN.md §11).
                items:
                  type: string
                type: array
              displayName:
                description: DisplayName is a human-friendly label shown in status
                  and Slack.
                type: string
              image:
                description: |-
                  Image is the agent runtime image. When set it MUST be pinned to a digest
                  (contains "@sha256:") so secret grants bind to immutable code — a tag is
                  rejected at apply time. Optional when BaseImageRef is used instead
                  (DESIGN.md §6, §9, §23).
                type: string
                x-kubernetes-validations:
                - message: image must be empty or pinned to a digest (@sha256:)
                  rule: self == '' || self.contains('@sha256:')
              model:
                description: Model configures the LLM provider and system prompt.
                properties:
                  providerRef:
                    type: string
                  systemPrompt:
                    type: string
                type: object
              network:
                description: Network restricts agent pod egress.
                properties:
                  egressAllowHosts:
                    items:
                      type: string
                    type: array
                type: object
              runtime:
                description: Runtime controls scale-to-zero session behavior.
                properties:
                  coldStartReply:
                    description: ColdStartReply is the message posted to Slack while
                      a sleeping agent wakes.
                    type: string
                  idleTimeout:
                    default: 15m
                    description: IdleTimeout is how long a session pod stays warm
                      before scaling to zero.
                    type: string
                  mode:
                    default: scaleToZeroSession
                    description: Mode is the runtime mode. Only scaleToZeroSession
                      is supported in v0.
                    enum:
                    - scaleToZeroSession
                    type: string
                type: object
              secrets:
                description: |-
                  Secrets are the secret references and delivery specs this agent may request.
                  Values never live here — only names + delivery (DESIGN.md §6, §8).
                items:
                  description: SecretRef names a secret this agent may request, with
                    its delivery spec.
                  properties:
                    delivery:
                      description: |-
                        Delivery is how the secret is materialized into the pod. Defined ONCE here;
                        grants store only a content hash of it (DESIGN.md §6 DRY note).
                      properties:
                        env:
                          additionalProperties:
                            type: string
                          description: Env are environment variables the bootstrap
                            sets pointing at the secret.
                          type: object
                        mode:
                          default: "0400"
                          description: Mode is the file mode (octal string).
                          type: string
                        path:
                          description: Path is the in-pod tmpfs path the secret file
                            is written to.
                          type: string
                        type:
                          default: file
                          description: Type is the delivery mechanism. Only "file"
                            (tmpfs) is supported in v0.
                          enum:
                          - file
                          type: string
                      required:
                      - path
                      type: object
                    name:
                      description: Name is the kube-claw secret name (metadata in
                        the store, value encrypted).
                      type: string
                  required:
                  - delivery
                  - name
                  type: object
                type: array
              storage:
                description: Storage declares workspace/memory/cache volumes (inline;
                  no StorageProfile CRD).
                properties:
                  cache:
                    description: VolumeSpec is one mounted volume.
                    properties:
                      mountPath:
                        description: MountPath is where the volume is mounted in the
                          agent pod.
                        type: string
                      size:
                        description: Size is the requested size for pvc volumes (e.g.
                          "10Gi").
                        type: string
                      type:
                        default: pvc
                        description: Type is "pvc" (default) or "emptyDir".
                        enum:
                        - pvc
                        - emptyDir
                        type: string
                    required:
                    - mountPath
                    type: object
                  memory:
                    description: VolumeSpec is one mounted volume.
                    properties:
                      mountPath:
                        description: MountPath is where the volume is mounted in the
                          agent pod.
                        type: string
                      size:
                        description: Size is the requested size for pvc volumes (e.g.
                          "10Gi").
                        type: string
                      type:
                        default: pvc
                        description: Type is "pvc" (default) or "emptyDir".
                        enum:
                        - pvc
                        - emptyDir
                        type: string
                    required:
                    - mountPath
                    type: object
                  workspace:
                    description: VolumeSpec is one mounted volume.
                    properties:
                      mountPath:
                        description: MountPath is where the volume is mounted in the
                          agent pod.
                        type: string
                      size:
                        description: Size is the requested size for pvc volumes (e.g.
                          "10Gi").
                        type: string
                      type:
                        default: pvc
                        description: Type is "pvc" (default) or "emptyDir".
                        enum:
                        - pvc
                        - emptyDir
                        type: string
                    required:
                    - mountPath
                    type: object
                type: object
            type: object
          status:
            description: AgentStatus is the observed state of an Agent.
            properties:
              agentSpecHash:
                description: AgentSpecHash binds grants to the current spec (re-approve
                  on change).
                type: string
              conditions:
                description: Conditions follow the standard Kubernetes condition convention.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              phase:
                description: Phase is the high-level lifecycle phase.
                enum:
                - Sleeping
                - Waking
                - Running
                - Blocked
                - Failed
                type: string
              selectedImageDigest:
                description: SelectedImageDigest is the resolved, digest-pinned image
                  in use.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
