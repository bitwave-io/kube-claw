apiVersion: claw.run/v1alpha1
kind: Agent
metadata:
  name: gcp-cost
  namespace: claw-agents
spec:
  displayName: GCP Cost Monitor
  # Reference a registered base image by capability (see `claw baseimage` / the
  # /ui/base-images page). "gcloud" is the generic Google Cloud SDK base; an AWS
  # cost agent would use "aws", an Azure one "azure". The run engine resolves it
  # to a concrete image at launch.
  baseImageRef: gcloud
  runtime:
    mode: scaleToZeroSession
    idleTimeout: 15m
    coldStartReply: "Checking GCP cost data..."
  storage:
    workspace:
      type: pvc
      size: 1Gi
      mountPath: /workspace
    memory:
      type: pvc
      size: 1Gi
      mountPath: /memory
    cache:
      type: emptyDir
      mountPath: /cache
  secrets:
    - name: gcp-billing-readonly
      delivery:
        type: file
        path: /var/run/claw/secrets/gcp-billing.json
        mode: "0400"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /var/run/claw/secrets/gcp-billing.json
  network:
    egressAllowHosts:
      - bigquery.googleapis.com
      - cloudbilling.googleapis.com
