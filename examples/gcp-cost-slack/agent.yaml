apiVersion: claw.run/v1alpha1
kind: Agent
metadata:
  name: gcp-cost
  namespace: claw-agents
spec:
  displayName: GCP Cost Monitor
  # Reference a registered base image (see `claw baseimage` / the /ui/base-images
  # page). The run engine resolves it to a concrete image at launch. On GKE point
  # this at the gcloud base; locally it can point at the arm64 stub runner.
  baseImageRef: gcp-cost-base
  runtime:
    mode: scaleToZeroSession
    idleTimeout: 15m
    coldStartReply: "Checking GCP cost data..."
  storage:
    workspace:
      type: pvc
      size: 1Gi
      mountPath: /workspace
    memory:
      type: pvc
      size: 1Gi
      mountPath: /memory
    cache:
      type: emptyDir
      mountPath: /cache
  secrets:
    - name: gcp-billing-readonly
      delivery:
        type: file
        path: /var/run/claw/secrets/gcp-billing.json
        mode: "0400"
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /var/run/claw/secrets/gcp-billing.json
  network:
    egressAllowHosts:
      - bigquery.googleapis.com
      - cloudbilling.googleapis.com
