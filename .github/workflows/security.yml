name: security

# Deterministic security scans: govulncheck (known vulns in deps + reachable
# stdlib) on every push/PR, plus manual dispatch.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    env:
      GOTOOLCHAIN: local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      # Advisory, not a gate: the latest released govulncheck is still built with
      # Go 1.25 and its package loader can't analyze this repo's go1.26 modules
      # (fails at load with "package requires newer Go version go1.26" before any
      # vuln analysis). Keep the scan running but non-blocking until a go1.26-based
      # govulncheck release ships, then drop continue-on-error.
      - name: govulncheck
        continue-on-error: true
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...
