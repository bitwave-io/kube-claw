name: build-push

# Build + push the kube-claw images to Docker Hub (docker.io/bitwavecode/kube-claw-*).
#
# Triggers only when the image build inputs change (the Dockerfiles AND the Go
# source/modules they compile in — a Dockerfile-only filter would ship stale
# images when runner/controller code changes), plus version tags and manual
# dispatch.
#
# Auth: a Docker Hub access token (Read & Write) stored as the repo secrets
#   DOCKERHUB_USERNAME (e.g. patwhitebw) and DOCKERHUB_TOKEN. The user must be a
#   member of the bitwavecode org with push rights; the public image repos are
#   created automatically on first push.
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "Dockerfile.runner"
      - "Dockerfile.runner-bash"
      - "Dockerfile.supervisor"
      - "images/**"
      - "cmd/**"
      - "internal/**"
      - "api/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/build-push.yml"

env:
  NAMESPACE: bitwavecode

jobs:
  build-push:
    runs-on: ubuntu-latest # amd64-native — no cross-build/emulation
    strategy:
      # Publish each image independently — one image's build failing shouldn't
      # cancel (and thus un-publish) the others.
      fail-fast: false
      matrix:
        include:
          - name: controller
            dockerfile: Dockerfile
          - name: runner
            dockerfile: Dockerfile.runner
          - name: runner-bash
            dockerfile: Dockerfile.runner-bash
          - name: supervisor
            dockerfile: Dockerfile.supervisor
          - name: gcloud
            dockerfile: images/gcloud/Dockerfile
          - name: aws
            dockerfile: images/aws/Dockerfile
          - name: azure
            dockerfile: images/azure/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.NAMESPACE }}/kube-claw-${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}

      # Stamp the release version into the binaries (internal/version) so the
      # self-update plane can semver-compare what it runs (DESIGN.md §24).
      # Non-tag builds stamp "dev" — deliberately never upgrade-comparable.
      - id: ver
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build + push kube-claw-${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=kube-claw-${{ matrix.name }}
          cache-to: type=gha,scope=kube-claw-${{ matrix.name }},mode=max

  # Release manifest (DESIGN.md §24.3): on a version tag, resolve the pushed
  # images to DIGESTS and publish manifest-<channel>.json as a release asset.
  # The supervisor polls .../releases/latest/download/manifest-stable.json —
  # digest-pinned refs mean an approval runs byte-for-byte what was approved.
  release-manifest:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release + upload the asset
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Render manifest-stable.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/}"        # v0.4.0
          TAG="${VERSION#v}"                        # 0.4.0 (metadata-action strips the v)
          digest_of() {
            docker buildx imagetools inspect "docker.io/${NAMESPACE}/$1:${TAG}"               --format '{{json .Manifest.Digest}}' | tr -d '"'
          }
          CTRL="docker.io/${NAMESPACE}/kube-claw-controller@$(digest_of kube-claw-controller)"
          RUNNER="docker.io/${NAMESPACE}/kube-claw-runner@$(digest_of kube-claw-runner)"
          # Release notes ride the ANNOTATED TAG MESSAGE into manifest.notes —
          # they surface in the Slack upgrade prompt and the management-channel
          # announcement. Read via the API (the local checkout may not carry
          # the tag object); lightweight tags => no notes. Capped: this is a
          # Slack line, not a changelog.
          NOTES=""
          TAG_SHA="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${VERSION}" --jq 'select(.object.type=="tag") | .object.sha' || true)"
          if [[ -n "$TAG_SHA" ]]; then
            NOTES="$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${TAG_SHA}" --jq .message | head -c 600 | sed -e 's/[[:space:]]*$//')"
          fi
          # Flags a release can set via the tag's commit (see docs): a file
          # release/flags.json at the tag may carry requiresHelmUpgrade /
          # containsMigration / minSupervisorVersion / notes overrides (a
          # notes key there wins over the tag message).
          FLAGS="{}"
          [[ -f release/flags.json ]] && FLAGS="$(cat release/flags.json)"
          jq -n             --arg version "$VERSION"             --arg controller "$CTRL"             --arg runner "$RUNNER"             --arg releasedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)"             --arg notes "$NOTES"             --argjson flags "$FLAGS"             '{schemaVersion: 1, channel: "stable", version: $version,
              releasedAt: $releasedAt,
              images: {controller: $controller, runner: $runner}}
             + (if $notes != "" then {notes: $notes} else {} end)
             + $flags' > manifest-stable.json
          cat manifest-stable.json

      # Manifest signing (T-9): a detached ed25519 signature over the exact
      # manifest bytes. Enable by storing a PEM private key as the
      # MANIFEST_SIGNING_KEY repo secret (openssl genpkey -algorithm ed25519)
      # and baking the matching public key into installs via the
      # updates.manifestPublicKey Helm value. Without the secret the manifest
      # publishes unsigned (installs without a configured key accept that).
      - name: Sign manifest
        env:
          SIGNING_KEY: ${{ secrets.MANIFEST_SIGNING_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "$SIGNING_KEY" ]]; then
            echo "MANIFEST_SIGNING_KEY not configured — publishing unsigned"
            exit 0
          fi
          printf '%s\n' "$SIGNING_KEY" > signing-key.pem
          openssl pkeyutl -sign -rawin -inkey signing-key.pem \
            -in manifest-stable.json -out manifest-stable.json.sig
          rm -f signing-key.pem
          echo "signed manifest-stable.json ($(wc -c < manifest-stable.json.sig) byte signature)"

      # Publish the chart as an OCI artifact so installs are a single command
      # with no repo clone:
      #   helm install claw oci://registry-1.docker.io/bitwavecode/claw \
      #     --version <semver> -n claw-system --create-namespace
      # The .tgz also lands on the GitHub release for air-gapped installs.
      - name: Package + push Helm chart
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/}"
          TAG="${VERSION#v}"
          helm package charts/claw --version "$TAG" --app-version "$TAG"
          echo "$DOCKERHUB_TOKEN" | helm registry login registry-1.docker.io \
            --username "$DOCKERHUB_USERNAME" --password-stdin
          helm push "claw-$TAG.tgz" oci://registry-1.docker.io/bitwavecode

      - name: Create release + upload manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/}"
          TAG="${VERSION#v}"
          gh release view "$VERSION" >/dev/null 2>&1 ||             gh release create "$VERSION" --title "$VERSION" --generate-notes
          gh release upload "$VERSION" manifest-stable.json --clobber
          gh release upload "$VERSION" "claw-$TAG.tgz" --clobber
          if [[ -f manifest-stable.json.sig ]]; then
            gh release upload "$VERSION" manifest-stable.json.sig --clobber
          fi
