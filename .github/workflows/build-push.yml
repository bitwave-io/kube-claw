name: build-push

# Build + push the kube-claw images to Docker Hub (docker.io/bitwavecode/claw-*).
#
# Triggers only when the image build inputs change (the Dockerfiles AND the Go
# source/modules they compile in — a Dockerfile-only filter would ship stale
# images when runner/controller code changes), plus version tags and manual
# dispatch.
#
# Auth: a Docker Hub access token (Read & Write) stored as the repo secrets
#   DOCKERHUB_USERNAME (e.g. patwhitebw) and DOCKERHUB_TOKEN. The user must be a
#   member of the bitwavecode org with push rights; the public image repos are
#   created automatically on first push.
on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - "Dockerfile.runner"
      - "Dockerfile.runner-bash"
      - "images/**"
      - "cmd/**"
      - "internal/**"
      - "api/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/build-push.yml"

env:
  NAMESPACE: bitwavecode

jobs:
  build-push:
    runs-on: ubuntu-latest # amd64-native — no cross-build/emulation
    strategy:
      matrix:
        include:
          - name: controller
            dockerfile: Dockerfile
          - name: runner
            dockerfile: Dockerfile.runner
          - name: runner-bash
            dockerfile: Dockerfile.runner-bash
          - name: gcloud
            dockerfile: images/gcloud/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: docker.io/${{ env.NAMESPACE }}/claw-${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha
            type=semver,pattern={{version}}

      - name: Build + push claw-${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=claw-${{ matrix.name }}
          cache-to: type=gha,scope=claw-${{ matrix.name }},mode=max
