<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="kube-claw: a cube-shaped lobster">
  <title>kube-claw</title>
  <!-- Palette matches the site: accent #ff5c47, accent2 #ffb347, ink #141824 -->

  <!-- tail: square segments peeking out behind the cube's right side -->
  <g fill="#c93a2a">
    <rect x="192" y="142" width="26" height="26" rx="7" transform="rotate(18 205 155)"/>
    <rect x="210" y="162" width="20" height="20" rx="6" transform="rotate(36 220 172)"/>
    <g transform="rotate(50 232 186)">
      <rect x="224" y="176" width="12" height="14" rx="4"/>
      <rect x="233" y="180" width="12" height="14" rx="4" transform="rotate(20 239 187)"/>
      <rect x="217" y="181" width="12" height="14" rx="4" transform="rotate(-20 223 188)"/>
    </g>
  </g>

  <!-- arms -->
  <rect x="48" y="118" width="34" height="16" rx="8" fill="#e64a34"/>
  <rect x="174" y="118" width="34" height="16" rx="8" fill="#e64a34"/>

  <!-- claws: squared-off pincers with a notch (left, then mirrored right) -->
  <g fill="#e64a34">
    <path id="claw" d="M26 94 H50 Q62 94 62 106 V144 Q62 156 50 156 H26 Q14 156 14 144 V138 L38 127 L14 114 V106 Q14 94 26 94 Z"/>
    <path d="M26 94 H50 Q62 94 62 106 V144 Q62 156 50 156 H26 Q14 156 14 144 V138 L38 127 L14 114 V106 Q14 94 26 94 Z"
          transform="translate(256,0) scale(-1,1)"/>
  </g>

  <!-- cube feet -->
  <rect x="90" y="188" width="16" height="16" rx="4" fill="#c93a2a"/>
  <rect x="150" y="188" width="16" height="16" rx="4" fill="#c93a2a"/>

  <!-- THE CUBE: side, top, front -->
  <polygon points="184,92 204,70 204,170 184,192" fill="#d0402e"/>
  <polygon points="72,92 92,70 204,70 184,92" fill="#ff8266"/>
  <rect x="72" y="92" width="112" height="100" rx="12" fill="#ff5c47"/>

  <!-- antennae, sprouting from the top face -->
  <g stroke="#c93a2a" stroke-width="6" stroke-linecap="round" fill="none">
    <path d="M104 72 Q96 48 84 38"/>
    <path d="M152 72 Q160 48 172 38"/>
  </g>
  <circle cx="82" cy="36" r="5" fill="#c93a2a"/>
  <circle cx="174" cy="36" r="5" fill="#c93a2a"/>

  <!-- face: big square eyes, sparkles, blush, tiny smile -->
  <g>
    <rect x="90" y="112" width="32" height="36" rx="10" fill="#ffffff"/>
    <rect x="134" y="112" width="32" height="36" rx="10" fill="#ffffff"/>
    <rect x="100" y="124" width="14" height="16" rx="5" fill="#141824"/>
    <rect x="144" y="124" width="14" height="16" rx="5" fill="#141824"/>
    <circle cx="111" cy="127" r="3" fill="#ffffff"/>
    <circle cx="155" cy="127" r="3" fill="#ffffff"/>
    <rect x="86" y="154" width="16" height="9" rx="4.5" fill="#ffb347" opacity="0.75"/>
    <rect x="154" y="154" width="16" height="9" rx="4.5" fill="#ffb347" opacity="0.75"/>
    <path d="M119 160 Q128 169 137 160" stroke="#141824" stroke-width="5" stroke-linecap="round" fill="none"/>
  </g>
</svg>
